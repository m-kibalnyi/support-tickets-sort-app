plugins:
  - rubocop-rails

AllCops:
  TargetRubyVersion: 3.3
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/cache_schema.rb'
    - 'db/queue_schema.rb'
    - 'db/cable_schema.rb'
    - 'vendor/**/*'
    - 'node_modules/**/*'
    - 'storage/**/*'

Rails:
  Enabled: true

Layout/LineLength:
  Max: 120
  Exclude:
    - 'db/migrate/*.rb'

Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'
    - 'config/environments/*.rb'
    - 'db/migrate/*.rb'

Metrics/MethodLength:
  Exclude:
    - 'db/migrate/*.rb'
